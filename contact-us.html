<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sarkari Job Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .contact-box { max-width: 600px; margin: auto; background: white; padding: 25px; border-top: 5px solid #003366; border-radius: 8px; }
        h1 { color: #003366; text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background: #003366; color: white; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .info { margin-top: 20px; font-size: 14px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="contact-box">
        <h1>Contact Us</h1>
        <p style="text-align:center;">Koi bhi sawal ya sujhaav ke liye humein message karein.</p>
        
        <form action="#">
            <input type="text" placeholder="Aapka Naam" required>
            <input type="email" placeholder="Email Address" required>
            <textarea rows="5" placeholder="Aapka Sawal Yahan Likhein..." required></textarea>
            <button type="submit" class="btn-submit">Message Bheinjein</button>
        </form>

        <div class="info">
            <p><b>Admin:</b> Akash Kumar Tarar</p>
            <p><b>Location:</b> Gujarat, India</p>
        </div>
        <br><center><a href="index.html">Back to Home</a></center>
    </div>
</body>
</html>

        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; border: 2px solid #003366; }

<body>
    <div class="box">
        <h2>🔢 Age Calculator</h2>
        <label>Date of Birth:</label><br>
        <input type="date" id="dob">
        <button class="btn" onclick="calculate()">Calculate Now</button>
        <div id="res" style="margin-top:20px; font-weight:bold; color:red;"></div>
        <br><a href="index.html">Back to Home</a>
    </div>
    <script>
        function calculate() {
            const dob = new Date(document.getElementById('dob').value);
            if (isNaN(dob)) { alert("DOB chunein"); return; }
            const diff = new Date() - dob;
            const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            document.getElementById('res').innerHTML = "Aapki Umar: " + years + " Saal";
        }

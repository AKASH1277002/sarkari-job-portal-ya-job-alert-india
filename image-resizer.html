    <title>Photo Resizer - Sarkari Jobs</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: auto; border: 2px solid #003366; }
        input { width: 90%; margin: 10px 0; padding: 10px; }
        .btn { background: #ff6600; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }

<body>
    <div class="box">
        <h2>🖼️ Image Resizer</h2>
        <p>Photo upload karein aur size kam karke download karein.</p>
        <input type="file" id="imageInput" accept="image/*">
        <label>Quality (1-100):</label><br>
        <input type="number" id="quality" value="60">
        <button class="btn" onclick="resizeImage()">Download Resized Photo</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <br><br><a href="index.html">Back to Home</a>
    </div>
    <script>
        function resizeImage() {
            const input = document.getElementById('imageInput');
            const quality = document.getElementById('quality').value / 100;
            if (!input.files[0]) { alert("Photo chuniye!"); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext("2d");
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url; link.download = "sarkari-photo.jpg";
                        link.click();
                    }, 'image/jpeg', quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
